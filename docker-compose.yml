version: '3.8'

services:
  # PHP Application
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: cbr_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - cbr_network

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: cbr_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - cbr_network

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: cbr_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: cbr_currencies
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: cbr_user
      MYSQL_PASSWORD: cbr_password
    command: 
      - --default-time-zone=Europe/Moscow
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - cbr_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: cbr_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - cbr_network

  # phpMyAdmin
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: cbr_phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root_password
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - cbr_network

networks:
  cbr_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local